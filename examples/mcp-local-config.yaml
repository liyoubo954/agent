# Copy this block into .mewcode/config.yaml alongside your provider settings.
# Replace <project-root> with the absolute path of the repository you want the
# local MCP server to expose.

mcp_servers:
  local:
    command: python
    args:
      - -m
      - mewcode.mcp.local_server
      - --root
      - <project-root>
    env:
      MEWCODE_MCP_ROOT: <project-root>
